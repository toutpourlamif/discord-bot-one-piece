services:
  postgres:
    image: postgres:16
    container_name: one-piece-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: one_piece
      POSTGRES_PASSWORD: one_piece
      POSTGRES_DB: one_piece
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
